<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --bg: #f0f2f5;
  --header: #1a472a;
  --card: #ffffff;
  --green: #16a34a;
  --green-bg: #dcfce7;
  --green-bd: #86efac;
  --gray-bd: #e5e7eb;
  --gray-txt: #9ca3af;
  --text: #1a1a1a;
  --sub: #6b7280;
  --radius: 12px;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
}

body {
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  min-height: 100vh;
}

#app-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--header);
  padding: 12px 14px 0;
}

.header-row1 {
  display: flex;
  align-items: center;
  gap: 10px;
  padding-bottom: 10px;
  flex-wrap: wrap;
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px;
  letter-spacing: 1px;
  color: #fff;
  white-space: nowrap;
}
.logo span { color: #f5c518; }

.stats {
  display: flex;
  gap: 6px;
}
.stat-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  background: rgba(255,255,255,0.1);
  border: none;
  cursor: pointer;
  padding: 6px 12px;
  border-radius: 20px;
  transition: all 0.2s;
}
.stat-btn.active {
  background: #f5c518;
}
.stat-btn.active .stat-count { color: #1a472a; }
.stat-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}
.stat-dot.green { background: #4ade80; }
.stat-dot.gray { background: #9ca3af; }
.stat-count {
  font-size: 14px;
  font-weight: 700;
  color: #fff;
}

.search-wrap {
  flex: 1;
  min-width: 150px;
  position: relative;
}
.search-wrap input {
  width: 100%;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 24px;
  padding: 8px 12px 8px 34px;
  color: #fff;
  font-size: 13px;
  outline: none;
}
.search-wrap input::placeholder { color: rgba(255,255,255,0.5); }
.search-wrap svg {
  position: absolute;
  left: 11px;
  top: 50%;
  transform: translateY(-50%);
  opacity: 0.6;
}

.sync-status {
  background: rgba(255,255,255,0.1);
  border: none;
  border-radius: 8px;
  color: #fff;
  padding: 6px 12px;
  font-size: 11px;
  cursor: pointer;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 5px;
}
.sync-status.syncing { background: #f5c518; color: #1a472a; }
.sync-status:hover { background: rgba(255,255,255,0.2); }

#progress-bar-wrap {
  background: var(--header);
  padding: 0 14px 12px;
}
.prog-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.prog-track {
  flex: 1;
  height: 6px;
  background: rgba(255,255,255,0.2);
  border-radius: 3px;
  overflow: hidden;
}
.prog-fill {
  height: 100%;
  background: #4ade80;
  border-radius: 3px;
  transition: width 0.3s ease;
  width: 0%;
}
.prog-pct {
  font-size: 12px;
  font-weight: 600;
  color: #4ade80;
  min-width: 45px;
}

#group-nav {
  background: var(--header);
  overflow-x: auto;
  scrollbar-width: thin;
  padding-bottom: 8px;
}
#group-nav::-webkit-scrollbar { height: 3px; }
#group-nav::-webkit-scrollbar-thumb { background: #f5c518; border-radius: 3px; }
.nav-inner {
  display: flex;
  gap: 6px;
  padding: 0 14px;
  width: max-content;
}
.nav-btn {
  background: rgba(255,255,255,0.08);
  border: none;
  color: rgba(255,255,255,0.7);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
}
.nav-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
.nav-btn.active {
  background: #f5c518;
  color: #1a472a;
  font-weight: 700;
}

#content {
  padding: 16px 12px 80px;
}

.group-section {
  margin-bottom: 16px;
}
.group-title {
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--sub);
  padding: 8px 4px 10px;
  border-bottom: 2px solid #e2e8f0;
  margin-bottom: 8px;
}

.team-card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 12px;
  overflow: hidden;
}
.team-header {
  padding: 12px 14px 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.team-name {
  font-size: 15px;
  font-weight: 700;
}
.team-prog-text {
  font-size: 12px;
  font-weight: 600;
  color: var(--green);
  background: #dcfce7;
  padding: 2px 8px;
  border-radius: 20px;
}
.team-prog-track {
  height: 4px;
  background: #e2e8f0;
  overflow: hidden;
}
.team-prog-fill {
  height: 100%;
  background: var(--green);
  transition: width 0.3s;
}

.stickers-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 12px;
}
.sticker {
  width: 42px;
  height: 42px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border: 2px solid var(--gray-bd);
  background: #fafafa;
  color: #64748b;
  transition: all 0.1s;
  user-select: none;
}
.sticker:active { transform: scale(0.94); }
.sticker.pegada {
  background: var(--green-bg);
  border-color: var(--green);
  color: var(--green);
  position: relative;
}
.sticker.pegada::after {
  content: "✓";
  position: absolute;
  top: 1px;
  right: 4px;
  font-size: 10px;
  font-weight: 700;
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--sub);
}
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }

#toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: #1a1a1a;
  color: #fff;
  padding: 10px 20px;
  border-radius: 30px;
  font-size: 13px;
  font-weight: 500;
  z-index: 1000;
  transition: all 0.25s;
  pointer-events: none;
  white-space: nowrap;
}
#toast.show {
  transform: translateX(-50%) translateY(0);
}
#toast.ok { background: #16a34a; }
#toast.error { background: #dc2626; }

.offline-badge {
  background: #dc2626;
  color: white;
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 10px;
  margin-left: 8px;
}
</style>

];

// ==================== ESTADO GLOBAL ====================
let pegadas = new Map(); // key -> { estado, pendiente }
let activeGroup = "Todos";
let filterMode = null;
let searchText = "";
let syncInterval = null;
let isOnline = true;

// ==================== PERSISTENCIA LOCAL ====================
function saveToLocalStorage() {
  const toSave = {};
  for (let [key, val] of pegadas) {
    if (val.estado === "p") toSave[key] = "p";
  }
  localStorage.setItem("panini2026_pegadas", JSON.stringify(toSave));
}

function loadFromLocalStorage() {
  const saved = localStorage.getItem("panini2026_pegadas");
  if (saved) {
    const obj = JSON.parse(saved);
    for (let [key, estado] of Object.entries(obj)) {
      pegadas.set(key, { estado: estado, pendiente: false });
    }
  }
}

// ==================== API CALLS ====================
async function apiCall(action, data = {}) {
  try {
    const response = await fetch(API_URL, {
      method: "POST",
      mode: "cors",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({ action, ...data })
    });
    
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const result = await response.json();
    return result;
  } catch (error) {
    console.error("API Error:", error);
    isOnline = false;
    return { error: error.message, offline: true };
  }
}

async function loadFromServer() {
  try {
    const result = await apiCall("getAllState");
    if (result.ok && !result.offline) {
      // Limpiar estado actual
      pegadas.clear();
      // Cargar desde servidor
      for (let [key, estado] of Object.entries(result.state)) {
        pegadas.set(key, { estado: estado, pendiente: false });
      }
      saveToLocalStorage();
      isOnline = true;
      render();
      showToast("Sincronizado con el servidor", "ok");
      return true;
    } else if (result.offline) {
      throw new Error("Offline");
    }
    return false;
  } catch (error) {
    console.error("Error loading from server:", error);
    isOnline = false;
    showToast("⚠️ Sin conexión - usando datos locales", "error");
    return false;
  }
}

async function syncToServer(key, estado) {
  if (estado === "p") {
    await apiCall("setState", { key, estado });
  } else {
    await apiCall("deleteState", { key });
  }
}

async function syncPending() {
  const pending = [];
  for (let [key, data] of pegadas) {
    if (data.pendiente) {
      pending.push({ key, estado: data.estado });
    }
  }
  
  if (pending.length === 0) return;
  
  for (let item of pending) {
    await syncToServer(item.key, item.estado);
    const current = pegadas.get(item.key);
    if (current) {
      current.pendiente = false;
      pegadas.set(item.key, current);
    }
  }
  
  saveToLocalStorage();
  render();
}

// ==================== TOGGLE STICKER ====================
function makeKey(teamId, numero) {
  return `${teamId}|${numero}`;
}

async function toggleSticker(teamId, numero) {
  const key = makeKey(teamId, numero);
  const current = pegadas.get(key);
  const newEstado = !current || current.estado !== "p";
  
  if (newEstado) {
    pegadas.set(key, { estado: "p", pendiente: true });
  } else {
    pegadas.delete(key);
  }
  
  saveToLocalStorage();
  render();
  showToast(newEstado ? "✓ Pegada" : "✗ Desmarcada");
  
  // Enviar al servidor inmediatamente si hay conexión
  if (isOnline) {
    try {
      if (newEstado) {
        await apiCall("setState", { key, estado: "p" });
      } else {
        await apiCall("deleteState", { key });
      }
      const currentData = pegadas.get(key);
      if (currentData) {
        currentData.pendiente = false;
        pegadas.set(key, currentData);
      } else if (!newEstado) {
        // Ya se eliminó, está bien
      }
      saveToLocalStorage();
    } catch (error) {
      console.error("Sync error:", error);
      showToast("⚠️ Sin conexión - se guardará después", "error");
      isOnline = false;
    }
  } else {
    // Intentar reconectar después
    setTimeout(() => attemptReconnect(), 5000);
  }
}

async function attemptReconnect() {
  const result = await loadFromServer();
  if (result) {
    await syncPending();
    isOnline = true;
    render();
    showToast("✅ Reconectado y sincronizado", "ok");
  }
}

// ==================== RENDERIZADO ====================
function render() {
  // Calcular estadísticas
  let totalFichas = 0;
  let totalPegadas = 0;
  
  ALBUM_DATA.forEach(grupo => {
    grupo.equipos.forEach(equipo => {
      equipo.fichas.forEach(num => {
        totalFichas++;
        const key = makeKey(equipo.id, num);
        const data = pegadas.get(key);
        if (data && data.estado === "p") totalPegadas++;
      });
    });
  });
  
  const porcentaje = totalFichas ? Math.round((totalPegadas / totalFichas) * 100) : 0;
  document.getElementById("cnt-pegadas").textContent = totalPegadas;
  document.getElementById("cnt-faltantes").textContent = totalFichas - totalPegadas;
  document.getElementById("prog-fill").style.width = `${porcentaje}%`;
  document.getElementById("prog-pct").textContent = `${porcentaje}%`;
  
  // Filtrar grupos
  const gruposMostrar = activeGroup === "Todos" 
    ? ALBUM_DATA 
    : ALBUM_DATA.filter(g => g.grupo === activeGroup);
  
  let html = "";
  
  gruposMostrar.forEach(grupo => {
    let grupoHtml = "";
    
    grupo.equipos.forEach(equipo => {
      // Filtrar por búsqueda
      const matchesSearch = !searchText || 
        equipo.nombre.toLowerCase().includes(searchText) ||
        equipo.id.toLowerCase().includes(searchText) ||
        equipo.fichas.some(n => n.toString().includes(searchText));
      
      if (!matchesSearch) return;
      
      // Filtrar fichas por modo
      let fichasMostrar = [...equipo.fichas];
      if (filterMode === "pegadas") {
        fichasMostrar = fichasMostrar.filter(n => {
          const data = pegadas.get(makeKey(equipo.id, n));
          return data && data.estado === "p";
        });
      } else if (filterMode === "faltantes") {
        fichasMostrar = fichasMostrar.filter(n => {
          const data = pegadas.get(makeKey(equipo.id, n));
          return !data || data.estado !== "p";
        });
      }
      
      if (fichasMostrar.length === 0 && filterMode) return;
      
      const pegadasEquipo = equipo.fichas.filter(n => {
        const data = pegadas.get(makeKey(equipo.id, n));
        return data && data.estado === "p";
      }).length;
      const totalEquipo = equipo.fichas.length;
      const pctEquipo = totalEquipo ? Math.round((pegadasEquipo / totalEquipo) * 100) : 0;
      
      let stickersHtml = "";
      fichasMostrar.forEach(num => {
        const data = pegadas.get(makeKey(equipo.id, num));
        const isPegada = data && data.estado === "p";
        const isPending = data && data.pendiente;
        stickersHtml += `<div class="sticker ${isPegada ? 'pegada' : ''}" 
                          style="${isPending ? 'opacity:0.7' : ''}"
                          onclick="toggleSticker('${equipo.id}', ${num})">
                          ${num}
                         </div>`;
      });
      
      grupoHtml += `
        <div class="team-card">
          <div class="team-header">
            <span class="team-name">${equipo.nombre}</span>
            <span class="team-prog-text">${pegadasEquipo}/${totalEquipo}</span>
          </div>
          <div class="team-prog-track">
            <div class="team-prog-fill" style="width: ${pctEquipo}%"></div>
          </div>
          <div class="stickers-grid">
            ${stickersHtml}
          </div>
        </div>
      `;
    });
    
    if (grupoHtml) {
      html += `<div class="group-section">
        <div class="group-title">${grupo.grupo}</div>
        ${grupoHtml}
      </div>`;
    }
  });
  
  if (!html) {
    html = `<div class="empty-state">
      <div class="icon">📭</div>
      <p>No hay resultados para "${searchText || (filterMode === 'pegadas' ? 'pegadas' : 'faltantes')}"</p>
    </div>`;
  }
  
  document.getElementById("content").innerHTML = html;
  
  // Actualizar badge de conexión
  const syncBtn = document.getElementById("sync-btn");
  if (!isOnline) {
    syncBtn.innerHTML = "⚠️ Offline";
    syncBtn.classList.add("syncing");
  } else {
    syncBtn.innerHTML = "🔄 Sync";
    syncBtn.classList.remove("syncing");
  }
}
